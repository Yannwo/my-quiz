<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRAM TOEIC // Grammar_Lab</title>
    <style>
        :root { 
            --bg-color: #1e1e1e; --card-bg: #252526; --text-main: #d4d4d4; 
            --accent: #dcdcaa; --correct: #b5cea8; --wrong: #f44747; 
            --border: #3c3c3c; --comment: #6a9955; --nav-bg: #333333; 
        }
        body { 
            font-family: 'Consolas', 'Monaco', sans-serif; max-width: 600px; 
            margin: 0 auto; padding: 20px; background-color: var(--bg-color); 
            color: var(--text-main); user-select: none;
        }

        .menu-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; cursor: pointer; z-index: 100; }
        .menu-btn div { width: 25px; height: 3px; background-color: var(--text-main); margin: 5px 0; border-radius: 2px; }
        .side-nav { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background-color: var(--nav-bg); transition: 0.3s; z-index: 99; padding-top: 60px; border-right: 1px solid var(--border); }
        .side-nav.open { left: 0; }
        .nav-item { padding: 15px 25px; color: var(--text-main); cursor: pointer; border-bottom: 1px solid #444; text-decoration: none; display: block; font-size: 0.9em; }

        .card { background: var(--card-bg); padding: 30px 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .word { font-size: clamp(1.8rem, 7vw, 2.5rem); font-weight: bold; color: var(--accent); margin-bottom: 20px; display: block; }
        
        .section-title { font-size: 0.85em; color: #9cdcfe; margin: 20px 0 10px 0; text-align: left; border-left: 3px solid #9cdcfe; padding-left: 10px; text-transform: uppercase; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        button.opt-btn { 
            width: 100%; padding: 16px 15px; border: 1px solid var(--border); 
            border-radius: 4px; background: #2d2d2d; color: var(--text-main); 
            text-align: left; cursor: pointer; outline: none; font-size: 1rem; 
            transition: 0.2s; font-family: inherit;
        }
        button.opt-btn.selected { border-color: var(--accent); background: #3e3e3e; }
        
        /* 修正後的狀態顏色 */
        .correct-ans { border-color: var(--correct) !important; color: var(--correct) !important; background: rgba(181, 206, 168, 0.1) !important; }
        .wrong-ans { border-color: var(--wrong) !important; color: var(--wrong) !important; background: rgba(244, 71, 71, 0.1) !important; }

        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 10px; font-family: inherit; }
        #submit-btn { background: #dcdcaa; color: #1e1e1e; }
        #next-btn { background: #6a9955; color: white; display: none; }

        .stats-bar { margin-top: 25px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; font-size: 0.85em; color: var(--comment); }
    </style>
</head>
<body onclick="closeNav()">

    <button class="menu-btn" onclick="event.stopPropagation(); toggleNav()"><div></div><div></div><div></div></button>
    <nav id="sideNav" class="side-nav" onclick="event.stopPropagation()">
        <a href="index.html" class="nav-item">🏠 HOME</a>
        <a href="en_to_zh.html" class="nav-item">Vocabulary Test</a>
        <a href="grammar_test.html" class="nav-item" style="color:var(--accent)">🧪 Grammar Lab</a>
        <a href="word_list.html" class="nav-item">📚 Word Bank</a>
    </nav>

    <div class="card">
        <span class="word" id="target-word">SYNCING...</span>

        <div class="section-title">PHASE_01: PART_OF_SPEECH</div>
        <div id="pos-options" class="options-grid"></div>

        <div class="section-title">PHASE_02: CHINESE_MEANING</div>
        <div id="zh-options" class="options-grid"></div>

        <button id="submit-btn" class="action-btn" onclick="checkAnswers()">CHECK_ANSWERS()</button>
        <button id="next-btn" class="action-btn" onclick="initQuestion()">NEXT_CHALLENGE()</button>

        <div class="stats-bar">
            Queue: <span id="progress-text">--</span>
        </div>
    </div>

    <script>
        let masterData = [], activePool = [], currentItem = {};
        let selectedPOSValue = null, selectedZHWord = null;

        async function init() {
            try {
                const res = await fetch('VocabularyList.csv');
                const content = new TextDecoder('utf-8').decode(await res.arrayBuffer());
                const rows = content.split(/\r?\n/).filter(r => r.includes(','));
                masterData = rows.slice(1).map(r => {
                    const c = r.split(',').map(v => v.replace(/^"|"$/g, '').trim());
                    return { en: c[0], zh: c[1], pos: c[2] || "", filter: c[3] || "0" };
                }).filter(i => i.en && i.filter === "1"); 
                activePool = [...masterData];
                initQuestion();
            } catch (e) { document.getElementById('target-word').innerText = 'LOAD_ERROR'; }
        }

        function initQuestion() {
            if(!activePool.length) { 
                document.getElementById('target-word').innerText = "ALL_COMPLETED"; 
                return; 
            }
            currentItem = activePool[Math.floor(Math.random() * activePool.length)];
            document.getElementById('target-word').innerText = currentItem.en;
            document.getElementById('progress-text').innerText = activePool.length;
            
            selectedPOSValue = null; selectedZHWord = null;
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';

            renderPOS();
            renderZH();
        }

        function renderPOS() {
            const box = document.getElementById('pos-options');
            box.innerHTML = '';
            const opts = ["prep.", "conj.", "prep. / conj."];
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn pos-opt';
                btn.innerText = `> ${opt}`;
                btn.dataset.val = opt; // 存入純淨數值
                btn.onclick = () => {
                    document.querySelectorAll('.pos-opt').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedPOSValue = opt;
                };
                box.appendChild(btn);
            });
        }

        function renderZH() {
            const box = document.getElementById('zh-options');
            box.innerHTML = '';
            let pool = [currentItem];
            while(pool.length < 4) {
                let r = masterData[Math.floor(Math.random()*masterData.length)];
                if(!pool.find(o=>o.en===r.en)) pool.push(r);
            }
            pool.sort(()=>Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn zh-opt';
                btn.innerText = `> ${o.zh}`;
                btn.dataset.en = o.en;
                btn.onclick = () => {
                    document.querySelectorAll('.zh-opt').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedZHWord = o.en;
                };
                box.appendChild(btn);
            });
        }

        function checkAnswers() {
            if(!selectedPOSValue || !selectedZHWord) { 
                alert("Please complete both phases!"); 
                return; 
            }
            
            let isCorrect = true;
            // 將 CSV 內容標準化
            const csvPos = currentItem.pos.trim().toLowerCase();

            // 審核 PHASE 01 (詞性)
            document.querySelectorAll('.pos-opt').forEach(btn => {
                btn.onclick = null;
                const btnVal = btn.dataset.val.toLowerCase();
                
                // 只要按鈕文字跟 CSV 互相包含，就標綠色（正確答案）
                if(csvPos.includes(btnVal) || btnVal.includes(csvPos)) {
                    btn.classList.add('correct-ans');
                }
                
                // 如果你選了這項，但它不是正確答案
                if(btn.classList.contains('selected')) {
                    if(!(csvPos.includes(btnVal) || btnVal.includes(csvPos))) {
                        btn.classList.add('wrong-ans');
                        isCorrect = false;
                    }
                }
            });

            // 審核 PHASE 02 (中文)
            document.querySelectorAll('.zh-opt').forEach(btn => {
                btn.onclick = null;
                if(btn.dataset.en === currentItem.en) {
                    btn.classList.add('correct-ans');
                }
                if(btn.classList.contains('selected') && btn.dataset.en !== currentItem.en) {
                    btn.classList.add('wrong-ans');
                    isCorrect = false;
                }
            });

            if(isCorrect) {
                activePool = activePool.filter(i => i.en !== currentItem.en);
            }

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }
        function closeNav() { document.getElementById('sideNav').classList.remove('remove'); }
        init();
    </script>
</body>
</html>
