<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRAM TOEIC // Terminal_Grammar</title>
    <style>
        :root { 
            --bg-color: #1e1e1e; --card-bg: #252526; --text-main: #d4d4d4; 
            --accent: #dcdcaa; --correct: #b5cea8; --wrong: #f44747; 
            --border: #3c3c3c; --comment: #6a9955; --nav-bg: #333333; 
        }
        body { 
            font-family: 'Consolas', 'Monaco', sans-serif; max-width: 600px; 
            margin: 0 auto; padding: 20px; background-color: var(--bg-color); 
            color: var(--text-main); user-select: none;
        }

        /* 導覽列 */
        .menu-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; cursor: pointer; z-index: 100; }
        .menu-btn div { width: 25px; height: 3px; background-color: var(--text-main); margin: 5px 0; border-radius: 2px; }
        .side-nav { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background-color: var(--nav-bg); transition: 0.3s; z-index: 99; padding-top: 60px; border-right: 1px solid var(--border); }
        .side-nav.open { left: 0; }
        .nav-item { padding: 15px 25px; color: var(--text-main); cursor: pointer; border-bottom: 1px solid #444; text-decoration: none; display: block; font-size: 0.9em; }

        /* 頂部裝飾 */
        .system-info { display: flex; justify-content: space-between; font-size: 0.7em; color: var(--comment); margin-bottom: 5px; opacity: 0.7; }
        .top-divider { height: 1px; background: linear-gradient(90deg, var(--comment), transparent); margin-bottom: 20px; }

        /* 卡片與文字 */
        .card { background: var(--card-bg); padding: 30px 20px; border-radius: 4px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        .word { font-size: clamp(1.8rem, 7vw, 2.5rem); font-weight: bold; color: var(--accent); margin-bottom: 20px; display: block; text-shadow: 0 0 10px rgba(220, 220, 170, 0.2); }
        
        .section-title { font-size: 0.8rem; color: #569cd6; margin: 25px 0 12px 0; text-align: left; padding-left: 10px; border-left: 2px solid #569cd6; font-weight: bold; letter-spacing: 1px; }

        /* 選項按鈕 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        button.opt-btn { 
            width: 100%; padding: 16px; border: 1px solid var(--border); 
            border-radius: 4px; background: #2d2d2d; color: var(--text-main); 
            text-align: left; cursor: pointer; outline: none; font-size: 0.95rem; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit;
        }
        button.opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #333; }
        button.opt-btn.selected { border-color: var(--accent); background: #3e3e42; color: var(--accent); box-shadow: 0 0 15px rgba(220, 220, 170, 0.1); }
        
        /* 審核顏色 */
        .correct-ans { border-color: var(--correct) !important; color: var(--correct) !important; background: rgba(181, 206, 168, 0.1) !important; }
        .wrong-ans { border-color: var(--wrong) !important; color: var(--wrong) !important; background: rgba(244, 71, 71, 0.1) !important; }

        /* 功能按鈕 */
        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; font-family: 'Consolas', monospace; letter-spacing: 2px; }
        #submit-btn { background: var(--accent); color: #1e1e1e; }
        #next-btn { background: var(--comment); color: white; display: none; }

        /* 進度條 */
        .stats-area { margin-top: 30px; text-align: left; }
        .progress-label { font-size: 0.7rem; color: var(--comment); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .progress-container { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
    </style>
</head>
<body onclick="closeNav()">

    <button class="menu-btn" onclick="event.stopPropagation(); toggleNav()"><div></div><div></div><div></div></button>
    <nav id="sideNav" class="side-nav" onclick="event.stopPropagation()">
        <a href="index.html" class="nav-item">🏠 HOME_STATION</a>
        <a href="en_to_zh.html" class="nav-item">🧪 VOCABULARY_TEST</a>
        <a href="grammar_test.html" class="nav-item" style="color:var(--accent)">🧬 GRAMMAR_LAB</a>
        <a href="word_list.html" class="nav-item">📚 DATABASE_EXPLORER</a>
    </nav>

    <div class="system-info">
        <span>CORE_V1.5 // GRAMMAR_RECALL</span>
        <span id="sys-time">ACCESS: STABLE</span>
    </div>
    <div class="top-divider"></div>

    <div class="card">
        <span class="word" id="target-word">INITIALIZING...</span>

        <div class="section-title">01_IDENTIFY_PART_OF_SPEECH</div>
        <div id="pos-options" class="options-grid"></div>

        <div class="section-title">02_TRANSLATION_RETRIEVAL</div>
        <div id="zh-options" class="options-grid"></div>

        <button id="submit-btn" class="action-btn" onclick="checkAnswers()">EXECUTE_VERIFICATION()</button>
        <button id="next-btn" class="action-btn" onclick="initQuestion()">LOAD_NEXT_SECTOR()</button>

        <div class="stats-area">
            <div class="progress-label">
                <span>QUEUE_STATUS</span>
                <span id="progress-text">0/0</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        let masterData = [], activePool = [], currentItem = {};
        let initialCount = 0;
        let selectedPOSValue = null, selectedZHWord = null;

        async function init() {
            try {
                const res = await fetch('VocabularyList.csv');
                const content = new TextDecoder('utf-8').decode(await res.arrayBuffer());
                const rows = content.split(/\r?\n/).filter(r => r.includes(','));
                masterData = rows.slice(1).map(r => {
                    const c = r.split(',').map(v => v.replace(/^"|"$/g, '').trim());
                    return { en: c[0], zh: c[1], pos: c[2] || "", filter: c[3] || "0" };
                }).filter(i => i.en && i.filter === "1"); 
                
                activePool = [...masterData];
                initialCount = activePool.length;
                initQuestion();
            } catch (e) { document.getElementById('target-word').innerText = 'CORE_LOAD_FAIL'; }
        }

        function initQuestion() {
            if(!activePool.length) { 
                document.getElementById('target-word').innerText = "SUCCESS: ALL_CLEARED"; 
                document.getElementById('submit-btn').style.display = 'none';
                updateProgress();
                return; 
            }
            currentItem = activePool[Math.floor(Math.random() * activePool.length)];
            document.getElementById('target-word').innerText = currentItem.en;
            
            selectedPOSValue = null; selectedZHWord = null;
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';

            renderPOS();
            renderZH();
            updateProgress();
        }

        function updateProgress() {
            const current = initialCount - activePool.length;
            const percent = (current / initialCount) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').innerText = `${current} / ${initialCount}`;
        }

        function renderPOS() {
            const box = document.getElementById('pos-options');
            box.innerHTML = '';
            const opts = ["prep.", "conj.", "prep. / conj."];
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn pos-opt';
                btn.innerText = `[ ] ${opt.toUpperCase()}`;
                btn.dataset.val = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.pos-opt').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedPOSValue = opt;
                };
                box.appendChild(btn);
            });
        }

        function renderZH() {
            const box = document.getElementById('zh-options');
            box.innerHTML = '';
            let pool = [currentItem];
            while(pool.length < 4) {
                let r = masterData[Math.floor(Math.random()*masterData.length)];
                if(!pool.find(o=>o.en===r.en)) pool.push(r);
            }
            pool.sort(()=>Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn zh-opt';
                btn.innerText = `:: ${o.zh}`;
                btn.dataset.en = o.en;
                btn.onclick = () => {
                    document.querySelectorAll('.zh-opt').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedZHWord = o.en;
                };
                box.appendChild(btn);
            });
        }

        function checkAnswers() {
            if(!selectedPOSValue || !selectedZHWord) return;
            
            let isCorrect = true;
            const csvPos = currentItem.pos.trim().toLowerCase();

            document.querySelectorAll('.pos-opt').forEach(btn => {
                btn.disabled = true;
                const btnVal = btn.dataset.val.toLowerCase();
                if(csvPos.includes(btnVal) || btnVal.includes(csvPos)) btn.classList.add('correct-ans');
                if(btn.classList.contains('selected') && !(csvPos.includes(btnVal) || btnVal.includes(csvPos))) {
                    btn.classList.add('wrong-ans');
                    isCorrect = false;
                }
            });

            document.querySelectorAll('.zh-opt').forEach(btn => {
                btn.disabled = true;
                if(btn.dataset.en === currentItem.en) btn.classList.add('correct-ans');
                if(btn.classList.contains('selected') && btn.dataset.en !== currentItem.en) {
                    btn.classList.add('wrong-ans');
                    isCorrect = false;
                }
            });

            if(isCorrect) activePool = activePool.filter(i => i.en !== currentItem.en);

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }
        function closeNav() { document.getElementById('sideNav').classList.remove('open'); }
        init();
    </script>
</body>
</html>
