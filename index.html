<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 1218 雙向挑戰系統</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --accent: #bb86fc; 
            --correct: #03dac6;
            --wrong: #cf6679;
            --border: #333;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 600px; margin: 0 auto; padding: 20px; 
            background-color: var(--bg-color); color: var(--text-main); 
        }

        /* 模式切換器樣式 */
        .mode-selector {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
        }
        .mode-btn {
            background: #222; border: 1px solid var(--border); color: #888;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9em;
        }
        .mode-btn.active {
            background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold;
        }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; 
            border: 1px solid var(--border);
        }

        .word-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin-bottom: 10px; min-height: 80px;
        }

        .word { font-size: 3em; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .main-speaker { font-size: 1.2em; cursor: pointer; opacity: 0.8; }

        .pos-badge { 
            display: inline-block; padding: 4px 12px; background: #222; color: var(--accent); 
            border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-bottom: 25px; 
            visibility: hidden; border: 1px solid var(--accent);
        }

        .options { display: grid; grid-template-columns: 1fr; gap: 12px; }
        
        .opt-row { display: flex; gap: 8px; }
        
        button.opt-btn { 
            flex: 1; padding: 16px; font-size: 1.1em; cursor: pointer; border: 1px solid var(--border); 
            border-radius: 12px; background: #252525; color: var(--text-main); 
            transition: 0.15s; font-weight: 500; text-align: center;
        }
        button.opt-btn:hover:not(:disabled) { background: #333; border-color: var(--accent); }
        
        /* 選項發音按鈕 */
        .opt-speak-btn {
            width: 55px; border-radius: 12px; border: 1px solid var(--border);
            background: #222; color: var(--accent); font-size: 1.2em; cursor: pointer;
        }

        .correct-ans { background: var(--correct) !important; color: #000 !important; font-weight: bold; border-color: var(--correct) !important; }
        .wrong-ans { background: var(--wrong) !important; color: #000 !important; font-weight: bold; border-color: var(--wrong) !important; }

        #next-btn { 
            margin-top: 25px; width: 100%; background: var(--accent); color: #000; 
            display: none; padding: 18px; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 1.1em; cursor: pointer; 
        }

        .info-row { margin-top: 20px; font-size: 0.85em; color: #666; display: flex; justify-content: space-between; align-items: center; }
        .btn-text { background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; }
        .btn-danger { color: #844; margin-top: 40px; width: 100%; text-align: center; display: block; }
    </style>
</head>
<body>

<div class="mode-selector">
    <button id="mode-en-zh" class="mode-btn active" onclick="setMode('EN_TO_ZH')">英選中</button>
    <button id="mode-zh-en" class="mode-btn" onclick="setMode('ZH_TO_EN')">中選英</button>
</div>

<div class="card">
    <div id="loader">📡 正在載入題庫...</div>
    <div id="quiz-ui" style="display:none;">
        <div class="word-container">
            <div class="word" id="target-word"></div>
            <div id="main-speaker-icon" class="main-speaker" onclick="speakText(currentItem.en)">🔊</div>
        </div>
        
        <div id="pos-display" class="pos-badge"></div>
        <div class="options" id="options-box"></div>
        <button id="next-btn">下一題</button>
        
        <div class="info-row">
            <span id="progress-text"></span>
            <button class="btn-text" onclick="toggleHistory()">顯示/隱藏紀錄</button>
        </div>
    </div>
</div>

<div id="history-area" style="display:none; margin-top:20px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div id="error-log" style="background:#151515; padding:10px; border-radius:10px; height:200px; overflow-y:auto; font-size:0.8em; border:1px solid #222;"><strong>❌ 錯誤</strong></div>
        <div id="correct-log" style="background:#151515; padding:10px; border-radius:10px; height:200px; overflow-y:auto; font-size:0.8em; border:1px solid #222;"><strong>✅ 已掌握</strong></div>
    </div>
</div>

<button class="btn-text btn-danger" onclick="resetProgress()">⚠️ 重置所有測驗進度</button>

<script>
    const STORAGE_KEY = 'toeic_quiz_v3_mastered';
    let masterData = []; 
    let activePool = []; 
    let currentItem = {};
    let currentMode = 'EN_TO_ZH'; // EN_TO_ZH 或 ZH_TO_EN
    const synth = window.speechSynthesis;

    async function init() {
        try {
            const res = await fetch('VocabularyList.csv');
            const buffer = await res.arrayBuffer();
            const content = new TextDecoder('utf-8').decode(buffer);
            parseCSV(content);
        } catch (e) {
            document.getElementById('loader').innerText = '❌ 檔案載入失敗';
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`mode-${mode.toLowerCase().replace(/_/g, '-')}`).classList.add('active');
        renderQuestion();
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).filter(r => r.trim() && r.includes(','));
        masterData = rows.slice(1).map(r => {
            const cells = r.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            return { en: cells[0], zh: cells[1], pos: cells[2] || "" };
        }).filter(item => item.en && item.zh);

        const mastered = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        activePool = masterData.filter(m => !mastered.includes(m.en));

        document.getElementById('loader').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        renderQuestion();
    }

    function speakText(text) {
        if (!text) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function renderQuestion() {
        if (activePool.length === 0) {
            document.getElementById('target-word').innerText = "🏆 完賽！";
            document.getElementById('options-box').innerHTML = "";
            return;
        }

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('pos-display').style.visibility = 'hidden';
        document.getElementById('progress-text').innerText = `剩餘：${activePool.length} / ${masterData.length}`;

        currentItem = activePool[Math.floor(Math.random() * activePool.length)];
        
        const isEnToZh = (currentMode === 'EN_TO_ZH');
        
        // 設定題目文字
        document.getElementById('target-word').innerText = isEnToZh ? currentItem.en : currentItem.zh;
        document.getElementById('pos-display').innerText = currentItem.pos;
        
        // 英選中才顯示主喇叭，且自動發音
        document.getElementById('main-speaker-icon').style.display = isEnToZh ? 'block' : 'none';
        if(isEnToZh) setTimeout(() => speakText(currentItem.en), 100);

        // 準備選項
        let correctValue = isEnToZh ? currentItem.zh : currentItem.en;
        let opts = [currentItem]; // 存物件以便中選英時拿英文發音
        while(opts.length < 4) {
            let r = masterData[Math.floor(Math.random() * masterData.length)];
            if(!opts.find(o => o.en === r.en)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach(obj => {
            const row = document.createElement('div');
            row.className = 'opt-row';
            
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = isEnToZh ? obj.zh : obj.en;
            btn.onclick = () => handleCheck(btn, isEnToZh ? obj.zh : obj.en);
            row.appendChild(btn);

            // 如果是中選英，加上小喇叭按鈕
            if (!isEnToZh) {
                const sBtn = document.createElement('button');
                sBtn.className = 'opt-speak-btn';
                sBtn.innerText = '🔊';
                sBtn.onclick = (e) => { e.stopPropagation(); speakText(obj.en); };
                row.appendChild(sBtn);
            }
            
            box.appendChild(row);
        });
    }

    function handleCheck(btn, val) {
        const correctVal = (currentMode === 'EN_TO_ZH') ? currentItem.zh : currentItem.en;
        const allBtns = document.querySelectorAll('.opt-btn, .opt-speak-btn');
        allBtns.forEach(b => b.disabled = true);
        
        document.getElementById('pos-display').style.visibility = 'visible';

        if (val === correctVal) {
            btn.classList.add('correct-ans');
            activePool = activePool.filter(i => i.en !== currentItem.en);
            saveProgress();
            updateLog('correct-log', currentItem.en);
        } else {
            btn.classList.add('wrong-ans');
            document.querySelectorAll('.opt-btn').forEach(b => {
                if(b.innerText === correctVal) b.classList.add('correct-ans');
            });
            updateLog('error-log', `${currentItem.en}: ${currentItem.zh}`);
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function saveProgress() {
        const mastered = masterData.filter(m => !activePool.find(a => a.en === m.en)).map(m => m.en);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mastered));
    }

    function updateLog(id, txt) {
        const el = document.getElementById(id);
        const div = document.createElement('div');
        div.style.borderBottom = "1px solid #222"; div.style.padding = "5px 0";
        div.innerText = txt;
        el.insertBefore(div, el.firstChild.nextSibling);
    }

    function toggleHistory() {
        const h = document.getElementById('history-area');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function resetProgress() {
        if (confirm('確定要清除所有進度重新開始嗎？')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    document.getElementById('next-btn').onclick = renderQuestion;
    init();
</script>

</body>
</html>
