<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC vorcabulary</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent-blue: #bb86fc; 
            --correct-green: #03dac6;
            --wrong-red: #cf6679;
            --border: #333;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 650px; margin: 0 auto; padding: 20px; 
            background-color: var(--bg-color); color: var(--text-main); 
        }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            border: 1px solid var(--border); margin-top: 20px;
        }

        .word { font-size: 3em; font-weight: 800; color: var(--accent-blue); margin-bottom: 5px; min-height: 1.2em; }
        
        .pos-badge { 
            display: inline-block; padding: 5px 15px; background: #333; color: var(--accent-blue); 
            border-radius: 20px; font-size: 0.9em; font-weight: bold; margin-bottom: 25px; 
            visibility: hidden; border: 1px solid var(--accent-blue);
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button { 
            padding: 15px; font-size: 1.05em; cursor: pointer; border: 1px solid var(--border); 
            border-radius: 12px; background: #2c2c2c; color: var(--text-main); 
            transition: 0.2s; font-weight: 500;
        }

        button:hover:not(:disabled) { background: #383838; border-color: var(--accent-blue); }
        
        .correct { background: var(--correct-green) !important; color: #000 !important; font-weight: bold; }
        .wrong { background: var(--wrong-red) !important; color: #000 !important; font-weight: bold; }

        #next-btn { 
            margin-top: 25px; width: 100%; background: var(--accent-blue); color: #000; 
            display: none; padding: 18px; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 1.1em; cursor: pointer; 
        }

        .history-section { margin-top: 30px; text-align: center; }
        .toggle-btn { background: none; border: 1px solid var(--border); color: #888; padding: 8px 20px; border-radius: 5px; font-size: 0.8em; cursor: pointer; }
        .reset-btn { background: none; border: 1px solid #444; color: #555; padding: 5px 10px; border-radius: 5px; font-size: 0.7em; margin-top: 10px; cursor: pointer; }
        
        .history-grid { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .history-box { 
            background: var(--card-bg); padding: 15px; border-radius: 12px; 
            height: 300px; overflow-y: auto; border: 1px solid var(--border); text-align: left;
        }

        .log-item { padding: 8px; border-bottom: 1px solid var(--border); font-size: 0.85em; }
        .progress-info { font-size: 0.85em; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="quiz-area">
        <div id="loading">📡 正在從網路載入單字表...</div>
        <div id="quiz-content" style="display:none;">
            <div class="word" id="target-word"></div>
            <div id="pos-display" class="pos-badge"></div>
            <div class="options" id="options-box"></div>
            <button id="next-btn">下一題</button>
            <div class="progress-info" id="progress-text"></div>
        </div>
    </div>
</div>

<div class="history-section">
    <button class="toggle-btn" onclick="toggleHistory()">顯示/隱藏 學習紀錄</button>
    <div id="history-grid" class="history-grid">
        <div class="history-box">
            <h3 style="color: var(--wrong-red); margin-top:0; font-size: 0.9em;">❌ 錯誤紀錄</h3>
            <div id="error-log"></div>
        </div>
        <div class="history-box">
            <h3 style="color: var(--correct-green); margin-top:0; font-size: 0.9em;">✅ 已掌握</h3>
            <div id="correct-log"></div>
        </div>
    </div>
    <br>
    <button class="reset-btn" onclick="resetProgress()">重置所有進度 (1218題重新開始)</button>
</div>
