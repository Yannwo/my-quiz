<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAM TOEIC v1.2.1</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #252526; 
            --text-main: #d4d4d4;
            --accent: #dcdcaa; 
            --correct: #b5cea8; 
            --wrong: #f44747;   
            --border: #3c3c3c;
            --comment: #6a9955;
            --nav-bg: #333333;
        }

        body { 
            font-family: 'Consolas', 'Monaco', 'Courier New', 'PingFang TC', sans-serif; 
            max-width: 600px; margin: 0 auto; padding: 20px; 
            background-color: var(--bg-color); color: var(--text-main); 
            user-select: none; -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* 漢堡選單 */
        .menu-btn {
            position: absolute; top: 20px; left: 20px;
            background: none; border: none; cursor: pointer; padding: 5px; z-index: 100;
        }
        .menu-btn div { width: 25px; height: 3px; background-color: var(--text-main); margin: 5px 0; border-radius: 2px; }

        .side-nav {
            position: fixed; top: 0; left: -250px; width: 220px; height: 100%;
            background-color: var(--nav-bg); transition: 0.3s; z-index: 99;
            padding-top: 60px; border-right: 1px solid var(--border);
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .side-nav.open { left: 0; }
        .nav-item {
            padding: 15px 25px; color: var(--text-main); cursor: pointer;
            border-bottom: 1px solid #444; font-size: 0.9em;
        }
        .nav-item:hover { background: #444; color: var(--accent); }
        .nav-item.active { background: #3e3e3e; color: var(--accent); border-left: 4px solid var(--accent); }

        .header-title { text-align: center; font-size: 1.1em; color: var(--comment); margin-bottom: 20px; font-weight: bold; }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 8px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--border);
        }

        .word-header { display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 80px; }
        .word { font-size: 2.8em; font-weight: bold; color: var(--accent) !important; word-break: break-all; }
        .speaker-btn { font-size: 1.5em; cursor: pointer; color: var(--accent); background: none; border: none; display: flex; align-items: center; }

        .pos-badge { 
            display: inline-block; padding: 2px 10px; background: #333; color: var(--comment); 
            border-radius: 4px; font-size: 0.85em; margin-bottom: 20px; 
            visibility: hidden; border: 1px solid var(--comment);
        }

        .options { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-row { display: flex; gap: 8px; }
        button.opt-btn { 
            flex: 1; padding: 16px; font-size: 1em; cursor: pointer; border: 1px solid var(--border); 
            border-radius: 4px; background: #2d2d2d; color: var(--text-main) !important; 
            text-align: left; padding-left: 20px; outline: none;
        }
        .row-speak-btn {
            width: 55px; border-radius: 4px; border: 1px solid var(--border);
            background: #2d2d2d; color: var(--accent) !important; font-size: 1.2em; cursor: pointer;
        }

        .correct-ans { background: #37373d !important; color: var(--correct) !important; font-weight: bold !important; border-color: var(--correct) !important; }
        .wrong-ans { background: #37373d !important; color: var(--wrong) !important; font-weight: bold !important; border-color: var(--wrong) !important; }

        #next-btn { 
            margin-top: 25px; width: 100%; background: var(--accent); color: #1e1e1e !important; 
            display: none; padding: 15px; border: none; border-radius: 4px; font-weight: bold; font-size: 1.1em; cursor: pointer;
        }

        .stats-bar {
            background: #252526; padding: 10px; border-radius: 4px; border: 1px solid var(--border);
            margin-top: 20px; display: flex; justify-content: space-around; font-size: 0.85em; color: var(--comment);
        }
        .stats-val { color: var(--accent); font-weight: bold; }

        /* Log 區域樣式 */
        .history-area { margin-top: 20px; display: block; } /* 預設開啟 Log 或根據需求切換 */
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .history-box { 
            background: #1e1e1e; padding: 12px; border-radius: 4px; height: 150px; 
            overflow-y: auto; font-size: 0.85em; border: 1px solid var(--border); text-align: left; color: #9cdcfe;
        }
        .log-item { border-bottom: 1px solid #333; padding: 4px 0; font-family: monospace; }
        
        /* 底部按鈕 */
        .bottom-controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-text { background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 0.85em; }
        .reset-btn { color: var(--wrong) !important; text-decoration: none !important; border: 1px solid #444; padding: 8px 15px; border-radius: 4px; transition: 0.2s; }
        
        .version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 0.75em; color: var(--comment); }
    </style>
</head>
<body onclick="closeNav()">

<button class="menu-btn" onclick="event.stopPropagation(); toggleNav()">
    <div></div><div></div><div></div>
</button>

<nav id="sideNav" class="side-nav" onclick="event.stopPropagation()">
    <div class="nav-item active" id="nav-EN_TO_ZH" onclick="switchPage('EN_TO_ZH')">SELECT (EN > ZH)</div>
    <div class="nav-item" id="nav-ZH_TO_EN" onclick="switchPage('ZH_TO_EN')">SELECT (ZH > EN)</div>
</nav>

<div class="header-title" id="page-title">CRAM_TOEIC // EN_TO_ZH</div>

<div class="card">
    <div class="word-header">
        <div class="word" id="target-word">Loading...</div>
        <button id="main-speaker" class="speaker-btn" onclick="speakText(currentItem.en)" style="display:none;">🔊</button>
    </div>
    <div id="pos-display" class="pos-badge"></div>
    <div class="options" id="options-box"></div>
    <button id="next-btn" onclick="renderQuestion()">RUN_NEXT_TASK()</button>
    
    <div class="stats-bar">
        <div>Remains: <span id="progress-text" class="stats-val">--</span></div>
        <div>Accuracy: <span id="accuracy-text" class="stats-val">0%</span></div>
    </div>
</div>

<div id="history-section" class="history-area">
    <div class="history-grid">
        <div>
            <div style="color:var(--wrong); font-size:0.75em; margin-bottom:5px;">[DEBUG_ERRORS]</div>
            <div id="error-log" class="history-box"></div>
        </div>
        <div>
            <div style="color:var(--correct); font-size:0.75em; margin-bottom:5px;">[MASTERED_SUCCESS]</div>
            <div id="correct-log" class="history-box" style="color:#ce9178;"></div>
        </div>
    </div>
</div>

<div class="bottom-controls">
    <button class="btn-text" onclick="toggleHistory()">// Toggle Logs Visibility</button>
    <button class="btn-text reset-btn" id="reset-current-btn" onclick="resetCurrentProgress()">[!] Hard_Reset_CURRENT_Mode</button>
</div>

<div class="version-tag">v1.2.1-split-logs</div>

<script>
    let masterData = []; 
    let activePool = []; 
    let currentItem = {};
    let currentMode = 'EN_TO_ZH';
    let totalAttempts = 0;
    let totalCorrect = 0;
    const synth = window.speechSynthesis;

    // 取得當前模式的 Storage Key
    function getStorageKey() {
        return `toeic_mastered_${currentMode}`;
    }

    async function init() {
        try {
            const res = await fetch('VocabularyList.csv');
            const buffer = await res.arrayBuffer();
            const content = new TextDecoder('utf-8').decode(buffer);
            const rows = content.split(/\r?\n/).filter(r => r.trim() && r.includes(','));
            masterData = rows.slice(1).map(r => {
                const cells = r.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                return { en: cells[0], zh: cells[1], pos: cells[2] || "" };
            }).filter(item => item.en && item.zh);
            
            switchPage('EN_TO_ZH'); 
        } catch (e) {
            document.getElementById('target-word').innerText = 'ERROR: LOAD_FAIL';
        }
    }

    function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }
    function closeNav() { document.getElementById('sideNav').classList.remove('open'); }

    function switchPage(mode) {
        currentMode = mode;
        closeNav();
        
        // UI 更新
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${mode}`).classList.add('active');
        document.getElementById('page-title').innerText = `CRAM_TOEIC // ${mode}`;
        document.getElementById('reset-current-btn').innerText = `[!] Hard_Reset_${mode}_Progress`;
        
        // 清空當次統計
        totalAttempts = 0; totalCorrect = 0;
        updateAccuracy();
        
        // 重新載入對應模式的資料與 Log
        refreshActivePool();
        initHistoryDisplay();
        renderQuestion();
    }

    function refreshActivePool() {
        const mastered = JSON.parse(localStorage.getItem(getStorageKey()) || '[]');
        activePool = masterData.filter(m => !mastered.includes(m.en));
    }

    function initHistoryDisplay() {
        // 清空當前畫面上的 Log
        document.getElementById('correct-log').innerHTML = '';
        document.getElementById('error-log').innerHTML = '';
        
        // 從該模式的 Storage 載入已掌握清單
        const masteredEnList = JSON.parse(localStorage.getItem(getStorageKey()) || '[]');
        masteredEnList.slice().reverse().forEach(en => {
            const item = masterData.find(m => m.en === en);
            if(item) addLogItem('correct-log', `${item.en} // ${item.zh}`);
        });
    }

    function updateAccuracy() {
        const acc = totalAttempts === 0 ? 0 : Math.round((totalCorrect / totalAttempts) * 100);
        document.getElementById('accuracy-text').innerText = `${acc}%`;
    }

    function speakText(text) {
        if (!text) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 0.9;
        synth.speak(utter);
    }

    function renderQuestion() {
        if (activePool.length === 0) {
            document.getElementById('target-word').innerText = "SUCCESS: MODE_COMPLETE";
            document.getElementById('options-box').innerHTML = "";
            return;
        }
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('pos-display').style.visibility = 'hidden';
        document.getElementById('progress-text').innerText = activePool.length;
        
        currentItem = activePool[Math.floor(Math.random() * activePool.length)];
        const isEnToZh = (currentMode === 'EN_TO_ZH');
        
        document.getElementById('target-word').innerText = isEnToZh ? currentItem.en : currentItem.zh;
        document.getElementById('pos-display').innerText = `/* ${currentItem.pos} */`;
        document.getElementById('main-speaker').style.display = isEnToZh ? 'inline-flex' : 'none';
        
        if(isEnToZh) setTimeout(() => speakText(currentItem.en), 100);

        let opts = [currentItem];
        while(opts.length < 4) {
            let r = masterData[Math.floor(Math.random() * masterData.length)];
            if(!opts.find(o => o.en === r.en)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach(obj => {
            const row = document.createElement('div');
            row.className = 'opt-row';
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = `> ${isEnToZh ? obj.zh : obj.en}`;
            btn.onclick = () => handleCheck(btn, obj);
            row.appendChild(btn);
            if (!isEnToZh) {
                const sBtn = document.createElement('button');
                sBtn.className = 'row-speak-btn'; sBtn.innerText = '🔊';
                sBtn.onclick = (e) => { e.stopPropagation(); speakText(obj.en); };
                row.appendChild(sBtn);
            }
            box.appendChild(row);
        });
    }

    function handleCheck(btn, clickedObj) {
        document.querySelectorAll('.opt-btn, .row-speak-btn').forEach(b => b.disabled = true);
        document.getElementById('pos-display').style.visibility = 'visible';
        totalAttempts++;
        if (clickedObj.en === currentItem.en) {
            totalCorrect++;
            btn.classList.add('correct-ans');
            activePool = activePool.filter(i => i.en !== currentItem.en);
            const key = getStorageKey();
            const mastered = JSON.parse(localStorage.getItem(key) || '[]');
            if(!mastered.includes(currentItem.en)) {
                mastered.push(currentItem.en);
                localStorage.setItem(key, JSON.stringify(mastered));
            }
            addLogItem('correct-log', `${currentItem.en} // ${currentItem.zh}`);
        } else {
            btn.classList.add('wrong-ans');
            document.querySelectorAll('.opt-btn').forEach(b => {
                const correctText = `> ${(currentMode === 'EN_TO_ZH') ? currentItem.zh : currentItem.en}`;
                if(b.innerText === correctText) b.classList.add('correct-ans');
            });
            addLogItem('error-log', `FAIL: ${currentItem.en} -> ${currentItem.zh}`);
        }
        updateAccuracy();
        document.getElementById('next-btn').style.display = 'block';
    }

    function addLogItem(id, text) {
        const el = document.getElementById(id);
        const div = document.createElement('div');
        div.className = 'log-item';
        div.innerText = text;
        el.insertBefore(div, el.firstChild);
    }

    function toggleHistory() {
        const h = document.getElementById('history-section');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function resetCurrentProgress() {
        if (confirm(`CAUTION: WIPE ALL PROGRESS FOR [${currentMode}]?`)) {
            localStorage.removeItem(getStorageKey());
            switchPage(currentMode); // 重新初始化該頁面
        }
    }

    init();
</script>

</body>
</html>
