<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 1218 極速練習</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --accent: #bb86fc; 
            --correct: #03dac6;
            --wrong: #cf6679;
            --border: #333;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 600px; margin: 0 auto; padding: 20px; 
            background-color: var(--bg-color); color: var(--text-main); 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .mode-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn {
            background: #222; border: 1px solid var(--border); color: #888;
            padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9em; transition: 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid var(--border);
        }

        .word-container { display: flex; align-items: center; justify-content: center; gap: 15px; min-height: 100px; }
        .word { font-size: 2.8em; font-weight: 800; color: var(--accent); line-height: 1.2; }
        .main-speaker { font-size: 1.5em; cursor: pointer; padding: 10px; display: none; }

        .pos-badge { 
            display: inline-block; padding: 4px 12px; background: #222; color: var(--accent); 
            border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-bottom: 25px; 
            visibility: hidden; border: 1px solid var(--accent);
        }

        .options { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-row { display: flex; gap: 8px; }
        
        button.opt-btn { 
            flex: 1; padding: 16px; font-size: 1.1em; cursor: pointer; border: 1px solid var(--border); 
            border-radius: 14px; background: #252525; color: var(--text-main); transition: 0.1s;
        }
        
        .opt-speak-btn {
            width: 55px; border-radius: 14px; border: 1px solid var(--border);
            background: #222; color: var(--accent); font-size: 1.3em; cursor: pointer;
        }

        /* 顏色修正與強化 */
        .correct-ans { background: var(--correct) !important; color: #000 !important; font-weight: bold; border-color: var(--correct) !important; }
        .wrong-ans { background: var(--wrong) !important; color: #000 !important; font-weight: bold; border-color: var(--wrong) !important; }

        #next-btn { 
            margin-top: 25px; width: 100%; background: var(--accent); color: #000; 
            display: none; padding: 18px; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1em; cursor: pointer;
        }

        .info-row { margin-top: 25px; font-size: 0.85em; color: #666; display: flex; justify-content: space-between; align-items: center; }
        .btn-text { background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; }

        .history-box { 
            background: #151515; padding: 12px; border-radius: 12px; height: 180px; 
            overflow-y: auto; font-size: 0.85em; border: 1px solid #222; text-align: left;
        }
    </style>
</head>
<body>

<div class="mode-selector">
    <button id="mode-en-zh" class="mode-btn active" onclick="changeMode('EN_TO_ZH')">英選中</button>
    <button id="mode-zh-en" class="mode-btn" onclick="changeMode('ZH_TO_EN')">中選英</button>
</div>

<div class="card">
    <div class="word-container">
        <div class="word" id="target-word">載入中...</div>
        <div id="main-speaker-icon" class="main-speaker" onclick="speakText(currentItem.en)">🔊</div>
    </div>
    <div id="pos-display" class="pos-badge"></div>
    <div class="options" id="options-box"></div>
    <button id="next-btn" onclick="renderQuestion()">下一題 NEXT</button>
    <div class="info-row">
        <span id="progress-text">剩餘：--</span>
        <button class="btn-text" onclick="toggleHistory()">顯示/隱藏紀錄</button>
    </div>
</div>

<div id="history-area" style="display:none; margin-top:20px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <div style="color:var(--wrong); font-size:0.8em; margin-bottom:5px;">❌ 錯誤紀錄</div>
            <div id="error-log" class="history-box"></div>
        </div>
        <div>
            <div style="color:var(--correct); font-size:0.8em; margin-bottom:5px;">✅ 已掌握</div>
            <div id="correct-log" class="history-box"></div>
        </div>
    </div>
</div>

<center><button class="btn-text" style="color:#844; margin-top:40px;" onclick="resetProgress()">⚠️ 重置進度</button></center>

<script>
    const STORAGE_KEY = 'toeic_mastered_v8';
    let masterData = []; 
    let activePool = []; 
    let currentItem = {};
    let currentMode = 'EN_TO_ZH';
    const synth = window.speechSynthesis;

    async function init() {
        try {
            const res = await fetch('VocabularyList.csv');
            const buffer = await res.arrayBuffer();
            const content = new TextDecoder('utf-8').decode(buffer);
            const rows = content.split(/\r?\n/).filter(r => r.trim() && r.includes(','));
            
            masterData = rows.slice(1).map(r => {
                const cells = r.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                return { en: cells[0], zh: cells[1], pos: cells[2] || "" };
            }).filter(item => item.en && item.zh);

            refreshActivePool();
            initHistoryDisplay();
            renderQuestion();
        } catch (e) {
            document.getElementById('target-word').innerText = '❌ 載入失敗';
        }
    }

    function refreshActivePool() {
        const mastered = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        activePool = masterData.filter(m => !mastered.includes(m.en));
    }

    function initHistoryDisplay() {
        const mastered = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const log = document.getElementById('correct-log');
        log.innerHTML = '';
        mastered.slice().reverse().forEach(en => addLogItem('correct-log', en));
    }

    function changeMode(mode) {
        if(currentMode === mode) return;
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === `mode-${mode.toLowerCase().replace(/_/g, '-')}`));
        // 模式切換時視為新的一題，所以重新渲染
        renderQuestion();
    }

    function speakText(text) {
        if (!text) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 0.9;
        synth.speak(utter);
    }

    function renderQuestion() {
        if (activePool.length === 0) {
            document.getElementById('target-word').innerText = "🏆 完賽";
            document.getElementById('options-box').innerHTML = "";
            return;
        }

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('pos-display').style.visibility = 'hidden';
        document.getElementById('progress-text').innerText = `剩餘：${activePool.length}`;

        currentItem = activePool[Math.floor(Math.random() * activePool.length)];
        const isEnToZh = (currentMode === 'EN_TO_ZH');
        
        document.getElementById('target-word').innerText = isEnToZh ? currentItem.en : currentItem.zh;
        document.getElementById('pos-display').innerText = currentItem.pos;
        document.getElementById('main-speaker-icon').style.display = isEnToZh ? 'block' : 'none';
        
        if(isEnToZh) setTimeout(() => speakText(currentItem.en), 100);

        let opts = [currentItem];
        while(opts.length < 4) {
            let r = masterData[Math.floor(Math.random() * masterData.length)];
            if(!opts.find(o => o.en === r.en)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach(obj => {
            const row = document.createElement('div');
            row.className = 'opt-row';
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = isEnToZh ? obj.zh : obj.en;
            // 綁定物件，判定更精準
            btn.onclick = () => handleCheck(btn, obj);
            row.appendChild(btn);
            if (!isEnToZh) {
                const sBtn = document.createElement('button');
                sBtn.className = 'opt-speak-btn'; sBtn.innerText = '🔊';
                sBtn.onclick = (e) => { e.stopPropagation(); speakText(obj.en); };
                row.appendChild(sBtn);
            }
            box.appendChild(row);
        });
    }

    function handleCheck(btn, clickedObj) {
        const allBtns = document.querySelectorAll('.opt-btn, .opt-speak-btn');
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('pos-display').style.visibility = 'visible';
        
        const isCorrect = (clickedObj.en === currentItem.en);

        if (isCorrect) {
            btn.classList.add('correct-ans');
            activePool = activePool.filter(i => i.en !== currentItem.en);
            
            const mastered = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if(!mastered.includes(currentItem.en)) {
                mastered.push(currentItem.en);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(mastered));
            }
            addLogItem('correct-log', currentItem.en);
        } else {
            btn.classList.add('wrong-ans');
            document.querySelectorAll('.opt-btn').forEach(b => {
                const correctText = (currentMode === 'EN_TO_ZH') ? currentItem.zh : currentItem.en;
                if(b.innerText === correctText) b.classList.add('correct-ans');
            });
            addLogItem('error-log', `${currentItem.en} (${currentItem.zh})`);
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function addLogItem(id, text) {
        const el = document.getElementById(id);
        const div = document.createElement('div');
        div.style.borderBottom = "1px solid #222"; div.style.padding = "4px 0";
        div.innerText = text;
        el.insertBefore(div, el.firstChild);
    }

    function toggleHistory() {
        const h = document.getElementById('history-area');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function resetProgress() {
        if (confirm('重置所有進度嗎？')) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
    }

    init();
</script>

</body>
</html>
