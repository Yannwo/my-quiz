<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 1218 挑戰系統</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --accent: #bb86fc; 
            --correct: #03dac6;
            --wrong: #cf6679;
            --border: #333;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 600px; margin: 0 auto; padding: 20px; 
            background-color: var(--bg-color); color: var(--text-main); 
        }

        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; 
            border: 1px solid var(--border); margin-top: 10px;
        }

        .word-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin-bottom: 5px; cursor: pointer; transition: 0.2s;
        }
        .word-container:active { transform: scale(0.95); }

        .word { font-size: 3.2em; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .speaker-icon { font-size: 1.5em; color: var(--accent); opacity: 0.7; }
        
        .pos-badge { 
            display: inline-block; padding: 4px 12px; background: #222; color: var(--accent); 
            border-radius: 8px; font-size: 0.9em; font-weight: bold; margin-bottom: 30px; 
            visibility: hidden; border: 1px solid var(--accent);
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button { 
            padding: 16px; font-size: 1.05em; cursor: pointer; border: 1px solid var(--border); 
            border-radius: 12px; background: #252525; color: var(--text-main); 
            transition: 0.15s; font-weight: 500; outline: none;
        }

        button:hover:not(:disabled) { background: #333; border-color: var(--accent); }
        
        .correct-ans { background: var(--correct) !important; color: #000 !important; font-weight: bold; border-color: var(--correct) !important; }
        .wrong-ans { background: var(--wrong) !important; color: #000 !important; font-weight: bold; border-color: var(--wrong) !important; }

        #next-btn { 
            margin-top: 25px; width: 100%; background: var(--accent); color: #000; 
            display: none; padding: 18px; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 1.1em; cursor: pointer; 
        }

        .info-row { margin-top: 20px; font-size: 0.85em; color: #666; display: flex; justify-content: space-between; align-items: center; }
        
        .history-area { margin-top: 20px; display: none; }
        .log-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .log-box { background: #151515; padding: 10px; border-radius: 10px; height: 250px; overflow-y: auto; font-size: 0.8em; border: 1px solid #222; text-align: left; }
        
        .control-btns { margin-top: 30px; text-align: center; border-top: 1px solid #222; padding-top: 20px; }
        .btn-text { background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 0.85em; margin: 0 10px; }
        .btn-text:hover { color: var(--accent); }
        .btn-danger { color: #844; }
        .btn-danger:hover { color: var(--wrong); }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">🛰️ 正在載入 VocabularyList.csv...</div>
    <div id="quiz-ui" style="display:none;">
        <div class="word-container" onclick="speakWord()" title="點擊發音">
            <div class="word" id="target-word"></div>
            <div class="speaker-icon">🔊</div>
        </div>
        
        <div id="pos-display" class="pos-badge"></div>
        <div class="options" id="options-box"></div>
        <button id="next-btn">下一題</button>
        
        <div class="info-row">
            <span id="progress-text"></span>
            <button class="btn-text" onclick="toggleHistory()">顯示/隱藏紀錄</button>
        </div>
    </div>
</div>

<div id="history-area" class="history-area">
    <div class="log-container">
        <div class="log-box" id="error-log"><strong>❌ 錯誤紀錄</strong></div>
        <div class="log-box" id="correct-log"><strong>✅ 已掌握</strong></div>
    </div>
</div>

<div class="control-btns">
    <button class="btn-text btn-danger" onclick="resetProgress()">⚠️ 重置所有測驗進度</button>
</div>

<script>
    const STORAGE_KEY = 'toeic_quiz_mastered_list';
    let masterData = []; 
    let activePool = []; 
    let currentItem = {};
    const synth = window.speechSynthesis;

    async function init() {
        try {
            const res = await fetch('VocabularyList.csv');
            if (!res.ok) throw new Error('找不到檔案');
            const buffer = await res.arrayBuffer();
            const content = new TextDecoder('utf-8').decode(buffer);
            parseCSV(content);
        } catch (e) {
            document.getElementById('loader').innerText = '❌ 載入失敗，請檢查檔案名稱與路徑。';
        }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).filter(r => r.trim() && r.includes(','));
        masterData = rows.slice(1).map(r => {
            const cells = r.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            return { en: cells[0], zh: cells[1], pos: cells[2] || "" };
        }).filter(item => item.en && item.zh);

        loadFromStorage();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        renderQuestion();
    }

    function loadFromStorage() {
        const mastered = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        activePool = masterData.filter(m => !mastered.includes(m.en));
    }

    function speakWord() {
        if (!currentItem.en) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(currentItem.en);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function renderQuestion() {
        if (activePool.length === 0) {
            document.getElementById('target-word').innerText = "🏆 全數完成！";
            document.getElementById('options-box').innerHTML = "";
            document.getElementById('progress-text').innerText = "進度：100%";
            return;
        }

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('pos-display').style.visibility = 'hidden';
        document.getElementById('progress-text').innerText = `剩餘：${activePool.length} / ${masterData.length}`;

        currentItem = activePool[Math.floor(Math.random() * activePool.length)];
        document.getElementById('target-word').innerText = currentItem.en;
        document.getElementById('pos-display').innerText = currentItem.pos;

        // 自動發音
        setTimeout(speakWord, 100);

        let opts = [currentItem.zh];
        while(opts.length < 4 && masterData.length >= 4) {
            let r = masterData[Math.floor(Math.random() * masterData.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.innerText = o;
            b.onclick = () => handleCheck(b, o);
            box.appendChild(b);
        });
    }

    function handleCheck(btn, val) {
        const btns = document.querySelectorAll('#options-box button');
        btns.forEach(b => b.disabled = true);
        document.getElementById('pos-display').style.visibility = 'visible';

        if (val === currentItem.zh) {
            btn.classList.add('correct-ans');
            activePool = activePool.filter(i => i.en !== currentItem.en);
            saveProgress();
            updateLog('correct-log', currentItem.en);
        } else {
            btn.classList.add('wrong-ans');
            btns.forEach(b => { if(b.innerText === currentItem.zh) b.classList.add('correct-ans'); });
            updateLog('error-log', `${currentItem.en}: ${currentItem.zh}`);
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function saveProgress() {
        const mastered = masterData.filter(m => !activePool.find(a => a.en === m.en)).map(m => m.en);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mastered));
    }

    function resetProgress() {
        if (confirm('⚠️ 確定要重置嗎？\n這將會清除所有已掌握的單字進度，讓你重新從 1218 題開始。')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    function updateLog(id, txt) {
        const el = document.getElementById(id);
        const div = document.createElement('div');
        div.style.borderBottom = "1px solid #222";
        div.style.padding = "5px 0";
        div.innerText = txt;
        el.insertBefore(div, el.firstChild.nextSibling);
    }

    function toggleHistory() {
        const h = document.getElementById('history-area');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    document.getElementById('next-btn').onclick = renderQuestion;
    init();
</script>

</body>
</html>
